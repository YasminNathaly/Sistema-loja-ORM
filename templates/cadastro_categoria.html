// Tela de cadastro de categorias
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de cadastro de categorias</title>
</head>
<body>
    <h1>Bem-vindo à Tela de Cadastro de Categorias</h1>
    <form action="/cadastrar_categoria" method="POST">
        <label for="nome_categoria">Nome da Categoria:</label>
        <input type="text" id="nome_categoria" name="nome_categoria" required>
        <br>
        <input type="submit" value="Cadastrar Categoria">
    </form>
</body>
</html>
